services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mycalculator:local
    container_name: mycalculator-app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - app_storage:/var/www/storage
      - app_cache:/var/www/bootstrap/cache
    networks:
      - mycalculator-network
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    image: nginx:alpine
    container_name: mycalculator-web
    restart: unless-stopped
    ports:
      - "8199:80"
    volumes:
      - ./infrastructure/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - mycalculator-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  mycalculator-network:
    driver: bridge

volumes:
  app_storage:
  app_cache:
